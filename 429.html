<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>429 | Too Many Requests</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/felix-bieri/particle-pro-error-pages@main/error_assets/styles.css">
  <meta name="description" content="Interactive particle-based error page where errors disintegrate and reassemble.">
</head>

<body data-error-code="429">

  <canvas id="canvas1" aria-hidden="true"></canvas>

  <div class="ui-layer" role="region" aria-label="Page actions">
    <div class="message">Too many requests. Please try again later.</div>
    <button id="reassembleBtn" class="btn" aria-label="Reassemble and return Home">Reload</button>
  </div>
  <script src="https://cdn.jsdelivr.net/gh/felix-bieri/particle-pro-error-pages@main/error_assets/script.js"></script>
</body>

</html>
