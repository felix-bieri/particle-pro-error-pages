<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | Page Not Found</title>
  <link rel="stylesheet" href="styles.css">
  <meta name="description" content="Interactive particle-based error page where errors disintegrate and reassemble.">
</head>

<body data-error-code="404">

  <canvas id="canvas1" aria-hidden="true"></canvas>

  <div class="ui-layer" role="region" aria-label="Page actions">
    <div class="message">The requested page could not be found but may be available again in the future.</div>
    <button id="reassembleBtn" class="btn" aria-label="Reassemble and return Home">Return Home</button>
  </div>
  <script src="script.js"></script>
</body>

</html>
