<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>502 | Bad Gateway</title>
  <link rel="stylesheet" href="/error_assets/styles.css">
  <meta name="description" content="Interactive particle-based error page where errors disintegrate and reassemble.">
</head>

<body data-error-code="502">

  <canvas id="canvas1" aria-hidden="true"></canvas>

  <div class="ui-layer" role="region" aria-label="Page actions">
    <div class="message">This proxy encountered an invalid reply from the host server. We are working on it; please try again in a bit.</div>
    <button id="reassembleBtn" class="btn" aria-label="Reassemble and return Home">Reload</button>
  </div>
  <script src="/error_assets/script.js"></script>
</body>

</html>
